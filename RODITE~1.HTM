function RegScreen({lang,setLang,onReg}){

    if(!form.name.trim()||!form.child.trim()||!c1||!c2){setErr(r.err);return;}
    if(needPass&&form.pass!==ROLE_PASSWORDS[form.role]){setErr(r.wrongPass);return;}

        <div className="text-center mb-8">
          <div className="w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-violet-300/50" style={{background:"linear-gradient(135deg,#7c3aed,#4f46e5)"}}>
            <span className="text-white text-3xl font-black">1Б</span>
          </div>
          <h1 className="text-2xl font-black text-slate-900">{r.welcome}</h1>
          <p className="text-slate-500 text-sm mt-1">{r.sub}</p>
          <p className="text-violet-600 text-sm font-semibold mt-1">{t.school}</p>
        </div>
        <div className="bg-white rounded-3xl shadow-xl shadow-slate-200/80 p-6 space-y-4">

          <Fld label={r.phone}><input className={INP} placeholder="+380 00 000 00 00" value={form.phone} onChange={e=>set("phone",e.target.value)}/></Fld>

          <Fld label={r.role}><select className={INP} value={form.role} onChange={e=>set("role",e.target.value)}>{Object.entries(t.roles).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></Fld>
          {needPass&&<Fld label={r.pass}><input className={INP} type="password" placeholder={r.passHint} value={form.pass} onChange={e=>set("pass",e.target.value)}/></Fld>}
          <div className="pt-2 space-y-3 border-t border-slate-100">
            {[[c1,setC1,r.c1,1],[c2,setC2,r.c2,2]].map(([st,setSt,lbl,idx])=>(
              <div key={idx} className="flex items-start gap-3">
                <input type="checkbox" id={`c${idx}`} checked={st} onChange={e=>setSt(e.target.checked)} className="mt-0.5 w-4 h-4 accent-violet-600 flex-shrink-0 cursor-pointer"/>

  );
}

          {upBday&&<div className="mt-2 bg-white/15 backdrop-blur rounded-xl px-3 py-2 flex items-center gap-2"><span className="text-base">🎂</span><span className="text-white/90 text-xs font-medium">{ua?upBday.n:upBday.nRu} — {upBday.days===0?t.ev.today:t.ev.inDays.replace("{n}",upBday.days)}</span></div>}
        </div>
        {/* TABS */}
        <div className="bg-white border-b border-slate-200 mt-2">
          <div className="max-w-2xl mx-auto flex overflow-x-auto noscroll">

          </div>
        </div>
      </header>

      <main className="max-w-2xl mx-auto p-3 pb-10">

      {/* ─── ОГОЛОШЕННЯ ─────────────────────────────────────────────── */}

        <div>
          <div className="flex justify-between items-center mb-3">
            <h2 className="font-black text-slate-800 text-lg">{t.ann.title}</h2>
            {canPost&&<Btn onClick={()=>setModal("ann")}>{t.ann.add}</Btn>}
          </div>
          {!canPost&&<div className="bg-amber-50 border border-amber-200 rounded-2xl p-3 mb-3 text-xs text-amber-700 font-medium">{t.ann.noAccess}</div>}

            {[...ann].sort((a,b)=>b.pinned-a.pinned).map(a=>(

                  {a.pinned&&<span className="text-xs font-bold text-violet-500 block mb-1">📌 {t.ann.pin}</span>}
                  <div className="flex justify-between items-start gap-2">
                    <h3 className="font-bold text-slate-900">{ua?a.title:a.titleRu}</h3>
                    {canPost&&<div className="flex gap-1 flex-shrink-0">
                      <button onClick={()=>setAnn(p=>p.map(x=>x.id===a.id?{...x,pinned:!x.pinned}:x))} className="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-violet-100 text-slate-400 hover:text-violet-600 text-sm transition-colors">📌</button>
                      <button onClick={()=>setAnn(p=>p.filter(x=>x.id!==a.id))} className="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-500 text-sm transition-colors">✕</button>
                    </div>}

                  <p className="text-slate-600 text-sm mt-1.5 leading-relaxed">{ua?a.text:a.textRu}</p>
                  <div className="flex justify-between mt-3 pt-2.5 border-t border-slate-50 text-xs text-slate-400"><span>{a.author}</span><span>{a.date}</span></div>
                </div>
              </div>
            ))}
          </div>
          <Modal show={modal==="ann"} onClose={()=>setModal(null)} title={t.ann.new}>
            <div className="space-y-3">
              <Fld label={t.ann.fTitle}><input className={INP} value={fAnn.title} onChange={e=>setFAnn(f=>({...f,title:e.target.value}))}/></Fld>
              <Fld label={t.ann.fText}><textarea className={INP} rows={4} value={fAnn.text} onChange={e=>setFAnn(f=>({...f,text:e.target.value}))}/></Fld>
              <div className="flex gap-2 pt-1"><Btn cls="flex-1 text-center" onClick={addAnn}>{t.ann.pub}</Btn><Btn v="sec" onClick={()=>setModal(null)}>{t.common.cancel}</Btn></div>
            </div>
          </Modal>
        </div>
      )}

      {/* ─── ФІНАНСИ ─────────────────────────────────────────────────── */}
      {tab==="fin"&&(
        <div>
          <h2 className="font-black text-slate-800 text-lg mb-3">{t.fin.title}</h2>
          <div className="grid grid-cols-3 gap-2 mb-4">
            {[[t.fin.coll,totColl,"grad-emerald"],[t.fin.spent,totExp,"grad-amber"],[t.fin.bal,totColl-totExp,"grad-violet"]].map(([lbl,val,gr])=>(
              <div key={lbl} className={`${gr} rounded-2xl p-3 text-center shadow-lg`}>
                <div className="text-white text-lg font-black">{val.toLocaleString()}</div>
                <div className="text-white/70 text-xs mt-0.5">{lbl} {t.cur}</div>
              </div>
            ))}
          </div>
          <div className="flex bg-white rounded-2xl p-1 mb-4 shadow-sm">
            {[[t.fin.tColl,"coll"],[t.fin.tExp,"exp"]].map(([lbl,k])=>(
              <button key={k} onClick={()=>setFinTab(k)} className={`flex-1 py-2 rounded-xl text-sm font-bold transition-all ${finTab===k?"bg-gradient-to-r from-violet-600 to-indigo-600 text-white shadow":"text-slate-500"}`}>{lbl}</button>
            ))}
          </div>
          {finTab==="coll"&&(
            <div>
              <div className="flex justify-end mb-2"><Btn v="ghost" onClick={()=>setModal("col")}>{t.fin.newColl}</Btn></div>
              <div className="space-y-3">
                {colls.map(col=>{
                  const pd=col.payments.filter(p=>p.paid).length;const pct=col.payments.length?Math.round(pd/col.payments.length*100):0;
                  return(
                    <div key={col.id} className="card">
                      <div className="h-1.5" style={{background:"linear-gradient(90deg,#10b981,#0891b2)"}}/>
                      <div className="card-inner">
                        <div className="flex justify-between mb-2">
                          <span className="font-bold text-slate-800">{ua?col.name:col.nameRu}</span>
                          <span className="font-black text-emerald-600">{col.amount} {t.cur}{t.fin.pp}</span>
                        </div>
                        <div className="flex items-center gap-2 mb-3">
                          <div className="flex-1 bg-slate-100 rounded-full h-2"><div className="bg-gradient-to-r from-emerald-400 to-teal-500 h-2 rounded-full transition-all" style={{width:`${pct}%`}}/></div>
                          <span className="text-xs font-bold text-slate-500">{pd}/{col.payments.length}</span>
                        </div>
                        <div className="divide-y divide-slate-50">
                          {col.payments.map(p=>(
                            <div key={p.id} className="flex items-center justify-between py-2">
                              <span className="text-sm text-slate-700">{ua?p.p:p.pRu}</span>
                              <button onClick={()=>togglePay(col.id,p.id)} className={`text-xs px-3 py-1 rounded-full font-bold transition-colors ${p.paid?"bg-emerald-100 text-emerald-700 hover:bg-emerald-200":"bg-slate-100 text-slate-500 hover:bg-slate-200"}`}>
                                {p.paid?t.fin.paid:t.fin.notPaid}
                              </button>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}
          {finTab==="exp"&&(
            <div>
              <div className="flex justify-end mb-2"><Btn v="ghost" onClick={()=>setModal("exp")}>{t.fin.addExp}</Btn></div>
              <div className="card">
                {exps.map((e,i)=>(
                  <div key={e.id} className={`flex items-center justify-between p-4 ${i>0?"border-t border-slate-50":""}`}>
                    <div><p className="font-semibold text-slate-800 text-sm">{ua?e.desc:e.descRu}</p><p className="text-xs text-slate-400">{e.date}</p></div>
                    <span className="font-black text-red-500">−{e.amount.toLocaleString()} {t.cur}</span>
                  </div>
                ))}
              </div>
            </div>
          )}
          <Modal show={modal==="col"} onClose={()=>setModal(null)} title={t.fin.newColl}>
            <div className="space-y-3"><Fld label={t.fin.colName}><input className={INP} value={fCol.name} onChange={e=>setFCol(f=>({...f,name:e.target.value}))}/></Fld><Fld label={t.fin.colAmt}><input className={INP} type="number" value={fCol.amount} onChange={e=>setFCol(f=>({...f,amount:e.target.value}))}/></Fld><div className="flex gap-2 pt-1"><Btn cls="flex-1 text-center" onClick={addCol}>{t.fin.create}</Btn><Btn v="sec" onClick={()=>setModal(null)}>{t.common.cancel}</Btn></div></div>
          </Modal>
          <Modal show={modal==="exp"} onClose={()=>setModal(null)} title={t.fin.addExp}>
            <div className="space-y-3"><Fld label={t.fin.expDesc}><input className={INP} value={fExp.desc} onChange={e=>setFExp(f=>({...f,desc:e.target.value}))}/></Fld><Fld label={t.fin.expAmt}><input className={INP} type="number" value={fExp.amount} onChange={e=>setFExp(f=>({...f,amount:e.target.value}))}/></Fld><div className="flex gap-2 pt-1"><Btn cls="flex-1 text-center" onClick={addExp}>{t.common.add}</Btn><Btn v="sec" onClick={()=>setModal(null)}>{t.common.cancel}</Btn></div></div>
          </Modal>
        </div>
      )}

      {/* ─── ПОДІЇ ─────────────────────────────────────────────────── */}
      {tab==="ev"&&(
        <div>
          <div className="flex justify-between items-center mb-3"><h2 className="font-black text-slate-800 text-lg">{t.ev.title}</h2><Btn onClick={()=>setModal("ev")}>{t.ev.add}</Btn></div>
          {upEv.length>0&&<><SL>{t.ev.up}</SL><div className="space-y-3 mb-2">{upEv.map(ev=>{const s=EVT_S[ev.type]||EVT_S.other;const joined=ev.vol.includes(user.name);return(<div key={ev.id} className="card"><div className={`h-1.5 ${s.dot}`}/><div className="card-inner"><div className="flex items-start gap-3"><div className={`w-2.5 h-2.5 rounded-full mt-1 flex-shrink-0 ${s.dot}`}/><div className="flex-1"><h3 className="font-bold text-slate-900">{ua?ev.title:ev.titleRu}</h3><p className="text-xs text-slate-500 mt-0.5">{ev.date}{ev.time?` · ${ev.time}`:""}</p><span className={`inline-block mt-1.5 text-xs font-bold px-2.5 py-1 rounded-full ${s.bg} ${s.text}`}>{t.ev.types[ev.type]}</span></div></div>{ev.type!=="birthday"&&<div className="mt-3 pt-3 border-t border-slate-50 flex items-center justify-between"><p className="text-xs text-slate-400">{t.ev.vol}: {ev.vol.length>0?ev.vol.join(", "):t.ev.noVol}</p><button onClick={()=>joinVol(ev.id)} disabled={joined} className={`text-xs font-bold px-3 py-1.5 rounded-xl transition-all ${joined?"bg-emerald-100 text-emerald-700":"bg-violet-100 text-violet-700 hover:bg-violet-200"}`}>{joined?t.ev.joined:t.ev.join}</button></div>}</div></div>);})}</div></>}
          {pastEv.length>0&&<><SL>{t.ev.past}</SL><div className="space-y-2 mb-2">{pastEv.map(ev=>{const s=EVT_S[ev.type]||EVT_S.other;return(<div key={ev.id} className="card opacity-60"><div className="card-inner flex items-center gap-3 py-3"><div className={`w-2 h-2 rounded-full flex-shrink-0 ${s.dot}`}/><div className="flex-1"><p className="text-sm font-semibold text-slate-700">{ua?ev.title:ev.titleRu}</p><p className="text-xs text-slate-400">{ev.date}</p></div><span className={`text-xs font-bold px-2 py-0.5 rounded-full ${s.bg} ${s.text}`}>{t.ev.types[ev.type]}</span></div></div>);})}</div></>}
          <SL>{t.ev.bdays}</SL>
          <div className="card"><div className="card-inner p-0">{BDAYS.map((b,i)=>{const d=daysUntil(b.d);return(<div key={i} className={`flex items-center justify-between p-4 ${i>0?"border-t border-slate-50":""}`}><div><p className="font-semibold text-slate-800 text-sm">{ua?b.n:b.nRu}</p><p className="text-xs text-slate-400">{b.d}</p></div><span className={`text-xs font-bold px-3 py-1 rounded-full ${d===0?"bg-rose-100 text-rose-600":d<=7?"bg-amber-100 text-amber-700":"bg-slate-100 text-slate-500"}`}>{d===0?t.ev.today:d>0?t.ev.inDays.replace("{n}",d):t.ev.passed}</span></div>);})}</div></div>
          <Modal show={modal==="ev"} onClose={()=>setModal(null)} title={t.ev.newEv}>
            <div className="space-y-3"><Fld label={ua?"Назва":"Название"}><input className={INP} value={fEv.title} onChange={e=>setFEv(f=>({...f,title:e.target.value}))}/></Fld><div className="grid grid-cols-2 gap-2"><Fld label="Дата"><input className={INP} type="date" value={fEv.date} onChange={e=>setFEv(f=>({...f,date:e.target.value}))}/></Fld><Fld label="Час"><input className={INP} type="time" value={fEv.time} onChange={e=>setFEv(f=>({...f,time:e.target.value}))}/></Fld></div><Fld label="Тип"><select className={INP} value={fEv.type} onChange={e=>setFEv(f=>({...f,type:e.target.value}))}>{Object.entries(t.ev.types).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></Fld><div className="flex gap-2 pt-1"><Btn cls="flex-1 text-center" onClick={addEv}>{t.common.add}</Btn><Btn v="sec" onClick={()=>setModal(null)}>{t.common.cancel}</Btn></div></div>
          </Modal>
        </div>
      )}

      {/* ─── БАТЬКИ ─────────────────────────────────────────────────── */}
      {tab==="par"&&(
        <div>
          <div className="flex justify-between items-center mb-3"><h2 className="font-black text-slate-800 text-lg">{t.par.title} ({parents.length})</h2><Btn onClick={()=>setModal("par")}>{t.par.add}</Btn></div>
          <input className={`${INP} mb-3`} placeholder={t.par.search} value={psearch} onChange={e=>setPsearch(e.target.value)}/>
          {filtPar.filter(p=>p.role!=="parent").length>0&&<><SL>{t.par.comm}</SL><div className="space-y-2 mb-2">{filtPar.filter(p=>p.role!=="parent").map(p=><div key={p.id} className="card"><div className="h-1 grad-violet"/><div className="card-inner flex items-center gap-3"><Av name={ua?p.name:p.nameRu} sz="md"/><div className="flex-1"><p className="font-bold text-slate-900 text-sm">{ua?p.name:p.nameRu}</p><p className="text-xs text-slate-500">{ua?p.child:p.childRu} · {p.phone}</p></div><span className="text-xs font-bold px-2.5 py-1 rounded-full bg-violet-100 text-violet-700">{t.roles[p.role]}</span></div></div>)}</div></>}
          <SL>{t.par.all}</SL>
          <div className="space-y-2">{filtPar.filter(p=>p.role==="parent").map(p=><div key={p.id} className="card"><div className="card-inner flex items-center gap-3 py-3"><Av name={ua?p.name:p.nameRu} sz="sm"/><div><p className="font-semibold text-slate-800 text-sm">{ua?p.name:p.nameRu}</p><p className="text-xs text-slate-500">{ua?p.child:p.childRu} · {p.phone}</p></div></div></div>)}</div>
          <Modal show={modal==="par"} onClose={()=>setModal(null)} title={t.par.add}>
            <div className="space-y-3"><Fld label={t.par.pName}><input className={INP} value={fPar.name} onChange={e=>setFPar(f=>({...f,name:e.target.value}))}/></Fld><Fld label={t.par.cName}><input className={INP} value={fPar.child} onChange={e=>setFPar(f=>({...f,child:e.target.value}))}/></Fld><Fld label={t.par.phone}><input className={INP} value={fPar.phone} onChange={e=>setFPar(f=>({...f,phone:e.target.value}))}/></Fld><Fld label={t.par.role}><select className={INP} value={fPar.role} onChange={e=>setFPar(f=>({...f,role:e.target.value}))}>{Object.entries(t.roles).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></Fld><div className="flex gap-2 pt-1"><Btn cls="flex-1 text-center" onClick={addPar}>{t.common.add}</Btn><Btn v="sec" onClick={()=>setModal(null)}>{t.common.cancel}</Btn></div></div>
          </Modal>
        </div>
      )}

      {/* ─── ОПИТУВАННЯ ──────────────────────────────────────────────── */}
      {tab==="pol"&&(
        <div>
          <div className="flex justify-between items-center mb-3"><h2 className="font-black text-slate-800 text-lg">{t.pol.title}</h2><Btn onClick={()=>setModal("poll")}>{t.pol.create}</Btn></div>
          <div className="space-y-4">
            {polls.map(poll=>{
              const total=poll.votes.reduce((a,b)=>a+b,0);const maxV=Math.max(...poll.votes);
              const opts=ua?poll.opts:poll.optsRu;
              return(
                <div key={poll.id} className="card">
                  <div className="h-1.5 grad-sky"/>
                  <div className="card-inner">
                    <div className="flex items-start justify-between gap-2 mb-4">
                      <h3 className="font-bold text-slate-900 flex-1">{ua?poll.q:poll.qRu}</h3>
                      <span className={`text-xs font-bold px-2.5 py-1 rounded-full ${poll.active?"bg-emerald-100 text-emerald-700":"bg-slate-100 text-slate-500"}`}>{poll.active?t.pol.active:t.pol.closed}</span>
                    </div>
                    <div className="space-y-3">
                      {opts.map((opt,idx)=>{
                        const pct=total>0?Math.round(poll.votes[idx]/total*100):0;
                        const isW=poll.votes[idx]===maxV&&total>0&&poll.voted!==null;
                        const isMe=poll.voted===idx;
                        return(
                          <button key={idx} onClick={()=>vote(poll.id,idx)} disabled={poll.voted!==null||!poll.active} className="w-full text-left">
                            <div className="flex justify-between mb-1"><span className={`text-sm font-semibold ${isMe?"text-violet-600":isW?"text-emerald-600":"text-slate-700"}`}>{opt}</span><span className="text-xs text-slate-400 ml-2">{poll.votes[idx]} ({pct}%)</span></div>
                            <div className="w-full bg-slate-100 rounded-full h-2 overflow-hidden"><div className={`h-2 rounded-full transition-all duration-500 ${isMe?"bg-gradient-to-r from-violet-500 to-indigo-500":isW?"bg-gradient-to-r from-emerald-400 to-teal-500":"bg-slate-300"}`} style={{width:`${pct}%`}}/></div>
                          </button>
                        );
                      })}
                    </div>
                    <div className="flex justify-between items-center mt-4 pt-3 border-t border-slate-50 text-xs text-slate-400">
                      <span>{t.pol.total}: {total}</span>
                      {poll.voted===null&&poll.active?<span className="text-violet-500 font-semibold">{t.pol.hint}</span>:<span className="text-emerald-600 font-semibold">{t.pol.voted}</span>}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          <Modal show={modal==="poll"} onClose={()=>setModal(null)} title={t.pol.create}>
            <div className="space-y-3"><Fld label={t.pol.q}><input className={INP} value={fPoll.q} onChange={e=>setFPoll(f=>({...f,q:e.target.value}))}/></Fld>{fPoll.opts.map((o,i)=><Fld key={i} label={`Варіант ${i+1}${i<2?" *":""}`}><input className={INP} value={o} onChange={e=>{const a=[...fPoll.opts];a[i]=e.target.value;setFPoll(f=>({...f,opts:a}));}} /></Fld>)}<div className="flex gap-2 pt-1"><Btn cls="flex-1 text-center" onClick={addPoll}>{t.pol.create}</Btn><Btn v="sec" onClick={()=>setModal(null)}>{t.common.cancel}</Btn></div></div>
          </Modal>
        </div>
      )}

      {/* ─── ДОКУМЕНТИ ───────────────────────────────────────────────── */}
      {tab==="doc"&&(
        <div>
          <h2 className="font-black text-slate-800 text-lg mb-3">{t.doc.title}</h2>
          <div className="card mb-4">
            {DOCS_DATA.map((doc,i)=>(
              <div key={doc.id} className={i>0?"border-t border-slate-100":""}>
                <button onClick={()=>setDocOpen(p=>({...p,[doc.id]:!p[doc.id]}))} className="w-full flex items-center gap-3 p-4 hover:bg-slate-50 transition-colors text-left">
                  <span className="text-xl w-8 text-center flex-shrink-0">{doc.icon}</span>
                  <div className="flex-1 min-w-0"><p className="font-semibold text-slate-800 text-sm">{ua?doc.name:doc.nameRu}</p><p className="text-xs text-slate-400">{doc.date}</p></div>
                  <span className={`text-slate-400 text-sm flex-shrink-0 chevron ${docOpen[doc.id]?"open":""}`}>▼</span>
                </button>
                {docOpen[doc.id]&&<div className="px-4 pb-4 border-t border-slate-100 bg-slate-50"><pre className="pre text-xs text-slate-700 leading-relaxed pt-3 overflow-x-auto">{ua?doc.content:doc.contentRu}</pre></div>}
              </div>
            ))}
          </div>
          <SL>{t.doc.teach}</SL>
          <div className="card mb-4">{TEACHERS.map((tc,i)=><div key={i} className={`flex items-center gap-3 p-4 ${i>0?"border-t border-slate-50":""}`}><Av name={ua?tc.n:tc.nRu} sz="sm"/><div><p className="font-semibold text-slate-800 text-sm">{ua?tc.n:tc.nRu}</p><p className="text-xs text-slate-500">{ua?tc.s:tc.sRu}</p><p className="text-xs text-slate-400">{tc.p}</p></div></div>)}</div>
          <SL>{t.doc.sched}</SL>
          <div className="card">{SCHEDULE.map((d,i)=><div key={i} className={`flex items-start gap-3 p-3 ${i%2===0?"bg-violet-50/50":""} ${i>0?"border-t border-slate-100":""}`}><span className="text-xs font-black text-violet-600 w-5 mt-1 flex-shrink-0">{d.d}</span><div className="flex flex-wrap gap-1">{d.l.map((l,j)=><span key={j} className="text-xs bg-white border border-slate-200 text-slate-700 px-2 py-1 rounded-lg shadow-sm">{j+1}. {l}</span>)}</div></div>)}</div>
        </div>
      )}

      {/* ─── ФОТОАЛЬБОМ ──────────────────────────────────────────────── */}
      {tab==="photo"&&(
        <div>
          <div className="flex justify-between items-center mb-3">
            <h2 className="font-black text-slate-800 text-lg">{t.photo.title}</h2>
            <button onClick={()=>fileRef.current&&fileRef.current.click()} className="flex items-center gap-1.5 bg-gradient-to-r from-pink-500 to-rose-500 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-md shadow-pink-200 hover:from-pink-600 hover:to-rose-600 transition-all">
              <span>📎</span> {t.photo.add}
            </button>
            <input ref={fileRef} type="file" accept="image/*" multiple className="hidden" onChange={handlePhoto}/>
          </div>
          {photos.length===0&&<Empty text={t.photo.noItems}/>}
          <div className="photo-grid">
            {photos.map(ph=>(
              <button key={ph.id} onClick={()=>setPhotoModal(ph)} className="aspect-square rounded-2xl overflow-hidden shadow-md hover:scale-105 transition-transform">
                <img src={ph.src} alt="" className="w-full h-full object-cover"/>
              </button>
            ))}
          </div>
          {/* Photo viewer modal */}
          {photoModal&&(
            <div className="fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-50 p-4" onClick={()=>setPhotoModal(null)}>
              <img src={photoModal.src} alt="" className="max-w-full max-h-[80vh] rounded-2xl shadow-2xl object-contain"/>
              <div className="mt-3 text-white/70 text-sm text-center">
                <span>{t.photo.by}: {photoModal.by}</span>
                <span className="mx-2">·</span>
                <span>{photoModal.date}</span>
              </div>
              <button className="mt-4 text-white/60 hover:text-white text-sm" onClick={()=>setPhotoModal(null)}>{t.common.close} ✕</button>
            </div>
          )}
        </div>
      )}

      {/* ─── ПОТРЕБИ ─────────────────────────────────────────────────── */}
      {tab==="needs"&&(
        <div>
          <div className="flex justify-between items-center mb-3">
            <h2 className="font-black text-slate-800 text-lg">{t.needs.title}</h2>
            {canMgr?<Btn onClick={()=>setModal("need")}>{t.needs.add}</Btn>:<span className="text-xs text-amber-600 bg-amber-50 px-3 py-1.5 rounded-xl font-medium">🔒</span>}
          </div>
          {!canMgr&&<div className="bg-amber-50 border border-amber-200 rounded-2xl p-3 mb-3 text-xs text-amber-700 font-medium">{t.needs.noAccess}</div>}
          {needs.length===0&&<Empty text={t.needs.noItems}/>}
          <div className="space-y-3">
            {needs.map(n=>{
              const iHelp=n.helpers.includes(user.name);
              return(
                <div key={n.id} className="card">
                  <div className={`h-1 ${n.done?"bg-emerald-400":"bg-orange-400"}`}/>
                  <div className="card-inner">
                    <div className="flex items-start justify-between gap-2">
                      <div className="flex-1">
                        <h3 className="font-bold text-slate-900">{ua?n.item:n.itemRu}</h3>
                        {n.qty&&<p className="text-xs text-slate-500 mt-0.5">📦 {n.qty}</p>}
                        {(ua?n.desc:n.descRu)&&<p className="text-sm text-slate-600 mt-1">{ua?n.desc:n.descRu}</p>}
                      </div>
                      <span className={`text-xs font-bold px-2.5 py-1 rounded-full flex-shrink-0 ${n.done?"bg-emerald-100 text-emerald-700":"bg-orange-100 text-orange-700"}`}>{n.done?t.needs.done:t.needs.needed}</span>
                    </div>
                    <div className="mt-3 pt-3 border-t border-slate-50 flex items-center justify-between">
                      <span className="text-xs text-slate-400">{n.helpers.length>0?n.helpers.join(", "):""}</span>
                      <div className="flex gap-2">
                        {canMgr&&<button onClick={()=>setNeeds(p=>p.map(x=>x.id===n.id?{...x,done:!x.done}:x))} className="text-xs font-bold px-2.5 py-1 rounded-xl bg-slate-100 hover:bg-slate-200 text-slate-600 transition-colors">✓</button>}
                        <button onClick={()=>helpNeed(n.id)} disabled={iHelp||n.done} className={`text-xs font-bold px-3 py-1.5 rounded-xl transition-all ${iHelp?"bg-emerald-100 text-emerald-700":"bg-orange-100 text-orange-700 hover:bg-orange-200"}`}>
                          {iHelp?t.needs.helped:t.needs.canHelp}
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          <Modal show={modal==="need"} onClose={()=>setModal(null)} title={t.needs.newItem}>
            <div className="space-y-3">
              <Fld label={t.needs.item}><input className={INP} value={fNeed.item} onChange={e=>setFNeed(f=>({...f,item:e.target.value}))}/></Fld>
              <Fld label={t.needs.qty}><input className={INP} value={fNeed.qty} onChange={e=>setFNeed(f=>({...f,qty:e.target.value}))}/></Fld>
              <Fld label={t.needs.desc}><input className={INP} value={fNeed.desc} onChange={e=>setFNeed(f=>({...f,desc:e.target.value}))}/></Fld>
              <div className="flex gap-2 pt-1"><Btn cls="flex-1 text-center" onClick={addNeed}>{t.common.add}</Btn><Btn v="sec" onClick={()=>setModal(null)}>{t.common.cancel}</Btn></div>
            </div>
          </Modal>
        </div>
      )}

      {/* ─── ДОПОМОГА ─────────────────────────────────────────────────── */}
      {tab==="help"&&(
        <div>
          <div className="rounded-3xl mb-4 p-4 text-white" style={{background:"linear-gradient(135deg,#e11d48,#9333ea)"}}>
            <h2 className="font-black text-lg">{t.help.title}</h2>
            <p className="text-white/80 text-sm mt-1">{t.help.sub}</p>
            <button onClick={()=>setModal("help")} className="mt-3 bg-white/20 hover:bg-white/30 text-white font-bold px-4 py-2 rounded-xl text-sm transition-colors border border-white/30">
              + {t.help.add}
            </button>
          </div>
          {helpReqs.length===0&&<Empty text={t.help.noItems}/>}
          <div className="space-y-3">
            {helpReqs.map(h=>(
              <div key={h.id} className="card">
                <div className="h-1.5 grad-rose"/>
                <div className="card-inner">
                  <div className="flex items-start justify-between gap-2 mb-2">
                    <div>
                      <span className={`text-xs font-bold px-2.5 py-1 rounded-full ${HELP_COLORS[h.type]||HELP_COLORS.other}`}>{t.help.types[h.type]}</span>
                      <p className="font-bold text-slate-800 mt-2">{h.anon?(ua?"Анонімно":"Анонимно"):ua?h.name:h.nameRu}</p>
                    </div>
                    <span className="text-xs text-slate-400 flex-shrink-0">{h.date}</span>
                  </div>
                  <p className="text-slate-600 text-sm leading-relaxed">{ua?h.desc:h.descRu}</p>
                  {h.contact&&<p className="text-xs text-slate-400 mt-1.5">📞 {h.contact}</p>}
                  <div className="mt-3 pt-3 border-t border-slate-50 flex items-center justify-between">
                    <span className="text-xs text-slate-400">{h.helpers} {t.help.helped}</span>
                    <button onClick={()=>helpReq(h.id)} className="text-xs font-bold px-3 py-1.5 rounded-xl bg-rose-50 text-rose-600 hover:bg-rose-100 transition-colors">{t.help.canHelp}</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
          <Modal show={modal==="help"} onClose={()=>setModal(null)} title={t.help.newReq}>
            <div className="space-y-3">
              <Fld label={t.help.typeL}><select className={INP} value={fHelp.type} onChange={e=>setFHelp(f=>({...f,type:e.target.value}))}>{Object.entries(t.help.types).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></Fld>
              <Fld label={t.help.desc}><textarea className={INP} rows={3} value={fHelp.desc} onChange={e=>setFHelp(f=>({...f,desc:e.target.value}))}/></Fld>
              <div className="flex items-center gap-3 py-1">
                <input type="checkbox" id="anon" checked={fHelp.anon} onChange={e=>setFHelp(f=>({...f,anon:e.target.checked}))} className="w-4 h-4 accent-rose-500 cursor-pointer"/>
                <label htmlFor="anon" className="text-sm text-slate-700 font-medium cursor-pointer">{t.help.anon}</label>
              </div>
              {!fHelp.anon&&<Fld label={t.help.contact}><input className={INP} placeholder="+380..." value={fHelp.contact} onChange={e=>setFHelp(f=>({...f,contact:e.target.value}))}/></Fld>}
              <div className="flex gap-2 pt-1"><Btn cls="flex-1 text-center" onClick={addHelp}>{t.common.add}</Btn><Btn v="sec" onClick={()=>setModal(null)}>{t.common.cancel}</Btn></div>
            </div>
          </Modal>
        </div>
      )}

      {/* ─── ТОП ─────────────────────────────────────────────────────── */}
      {tab==="top"&&(
        <div>
          <div className="rounded-3xl mb-4 p-4 text-white" style={{background:"linear-gradient(135deg,#d97706,#dc2626)"}}>
            <h2 className="font-black text-xl">🏆 {t.top.title}</h2>
          </div>
          <div className="flex bg-white rounded-2xl p-1 mb-4 shadow-sm">
            {[["students",t.top.students,"🎓"],["parents",t.top.parents,"👨‍👩‍👧"]].map(([k,lbl,ico])=>(
              <button key={k} onClick={()=>setTopTab(k)} className={`flex-1 py-2 rounded-xl text-sm font-bold transition-all flex items-center justify-center gap-1.5 ${topTab===k?"bg-gradient-to-r from-amber-500 to-orange-500 text-white shadow":"text-slate-500"}`}>{ico} {lbl}</button>
            ))}
          </div>
          {topTab==="students"&&(
            <div>
              {canMgr&&<div className="flex justify-end mb-3"><Btn onClick={()=>setModal("topSt")}>{t.top.addSt}</Btn></div>}
              {!canMgr&&<div className="bg-amber-50 border border-amber-200 rounded-2xl p-3 mb-3 text-xs text-amber-700 font-medium">{t.top.noAccess}</div>}
              {topSt.length===0&&<Empty text={t.top.noSt}/>}
              <div className="space-y-3">
                {topSt.map((s,i)=>(
                  <div key={s.id} className="card">
                    <div className={`h-1.5 ${s.lvl==="gold"?"bg-amber-400":s.lvl==="silver"?"bg-slate-400":"bg-amber-600"}`}/>
                    <div className="card-inner flex items-start gap-3">
                      <div className="w-10 h-10 rounded-full bg-gradient-to-br from-amber-200 to-orange-300 flex items-center justify-center text-lg flex-shrink-0 font-black text-amber-800">{i+1}</div>
                      <div className="flex-1">
                        <div className="flex items-center gap-2 flex-wrap">
                          <h3 className="font-black text-slate-900">{ua?s.name:s.nameRu}</h3>
                          <span className={`badge ${TOP_LEVEL_STYLE[s.lvl]}`}>{t.top.levels[s.lvl]}</span>
                        </div>
                        <p className="text-xs font-bold text-amber-600 mt-0.5">{t.top.sCats[s.cat]}</p>
                        <p className="text-sm text-slate-600 mt-1">{ua?s.reason:s.reasonRu}</p>
                        <p className="text-xs text-slate-400 mt-1">{s.date}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {topTab==="parents"&&(
            <div>
              {canMgr&&<div className="flex justify-end mb-3"><Btn onClick={()=>setModal("topPar")}>{t.top.addPar}</Btn></div>}
              {!canMgr&&<div className="bg-amber-50 border border-amber-200 rounded-2xl p-3 mb-3 text-xs text-amber-700 font-medium">{t.top.noAccess}</div>}
              {topPar.length===0&&<Empty text={t.top.noPar}/>}
              <div className="space-y-3">
                {topPar.map((p,i)=>(
                  <div key={p.id} className="card">
                    <div className="h-1.5 bg-gradient-to-r from-violet-400 to-indigo-400"/>
                    <div className="card-inner flex items-start gap-3">
                      <div className="w-10 h-10 rounded-full bg-gradient-to-br from-violet-200 to-indigo-300 flex items-center justify-center text-lg flex-shrink-0 font-black text-violet-800">{i+1}</div>
                      <div className="flex-1">
                        <div className="flex items-center gap-2">
                          <h3 className="font-black text-slate-900">{ua?p.name:p.nameRu}</h3>
                        </div>
                        <p className="text-xs font-bold text-violet-600 mt-0.5">{t.top.pCats[p.cat]}</p>
                        <p className="text-sm text-slate-600 mt-1">{ua?p.reason:p.reasonRu}</p>
                        <p className="text-xs text-slate-400 mt-1">{p.date}</p>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
          <Modal show={modal==="topSt"} onClose={()=>setModal(null)} title={t.top.addSt}>
            <div className="space-y-3">
              <Fld label={t.top.sName}><input className={INP} value={fTopSt.name} onChange={e=>setFTopSt(f=>({...f,name:e.target.value}))}/></Fld>
              <Fld label={t.top.cat}><select className={INP} value={fTopSt.cat} onChange={e=>setFTopSt(f=>({...f,cat:e.target.value}))}>{Object.entries(t.top.sCats).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></Fld>
              <Fld label={t.top.lvl}><select className={INP} value={fTopSt.lvl} onChange={e=>setFTopSt(f=>({...f,lvl:e.target.value}))}>{Object.entries(t.top.levels).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></Fld>
              <Fld label={t.top.reason}><input className={INP} value={fTopSt.reason} onChange={e=>setFTopSt(f=>({...f,reason:e.target.value}))}/></Fld>
              <div className="flex gap-2 pt-1"><Btn cls="flex-1 text-center" onClick={addTopSt}>{t.common.add}</Btn><Btn v="sec" onClick={()=>setModal(null)}>{t.common.cancel}</Btn></div>
            </div>
          </Modal>
          <Modal show={modal==="topPar"} onClose={()=>setModal(null)} title={t.top.addPar}>
            <div className="space-y-3">
              <Fld label={t.top.pName}><input className={INP} value={fTopPar.name} onChange={e=>setFTopPar(f=>({...f,name:e.target.value}))}/></Fld>
              <Fld label={t.top.cat}><select className={INP} value={fTopPar.cat} onChange={e=>setFTopPar(f=>({...f,cat:e.target.value}))}>{Object.entries(t.top.pCats).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></Fld>
              <Fld label={t.top.reason}><input className={INP} value={fTopPar.reason} onChange={e=>setFTopPar(f=>({...f,reason:e.target.value}))}/></Fld>
              <div className="flex gap-2 pt-1"><Btn cls="flex-1 text-center" onClick={addTopPar}>{t.common.add}</Btn><Btn v="sec" onClick={()=>setModal(null)}>{t.common.cancel}</Btn></div>
            </div>
          </Modal>
        </div>
      )}

      </main>
    </div>
  );
}

try{
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
}catch(e){
  document.getElementById("root").innerHTML='<div style="padding:20px;background:#fee2e2;border:2px solid #ef4444;border-radius:12px;margin:20px;font-family:monospace;font-size:13px;color:#991b1b"><b>React error:</b><br>'+e.message+'</div>';
}
</script>
</body>
</html>
