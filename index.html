<script type="text/babel">
/* @jsxRuntime classic */
const { useState, useEffect, useRef } = React;

const ROLE_PASSWORDS = { teacher:"vchytel101", admin:"admin101", chairman:"golova101" };

// ── FIREBASE SHARED STATE HOOK ────────────────────────────────────────────────
// useFBState(path) — повністю замінює useState([]) для спільних даних.
// Будь-яка зміна одразу синхронізується з Firebase і видна ВСІМ користувачам.
const DB_ROOT = "klas1b";
function useFBState(path, init=[]) {
  const [val, setValLocal] = useState(init);
  useEffect(() => {
    const db = window._db;
    if (!db) return;
    const ref = db.ref(DB_ROOT + "/" + path);
    ref.on('value', snap => {
      const v = snap.val();
      setValLocal(v && typeof v === 'object' ? Object.values(v).filter(Boolean) : []);
    });
    return () => ref.off('value');
  }, []);
  function setVal(updater) {
    setValLocal(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      const db = window._db;
      if (db) {
        const ref = db.ref(DB_ROOT + "/" + path);
        if (!next || next.length === 0) {
          ref.set(null).catch(()=>{});
        } else {
          const obj = {};
          next.forEach(item => { if (item && item.id !== undefined) obj[String(item.id)] = item; });
          ref.set(obj).catch(()=>{});
        }
      }
      return next;
    });
  }
  return [val, setVal];
}

// ── TELEGRAM NOTIFICATION ─────────────────────────────────────────────────────
const sendTgMsg = (text) => {
  if (!window._db) return;
  window._db.ref("klas1b/tgToken").once('value', tSnap => {
    const token = tSnap.val();
    if (!token) return;
    window._db.ref("klas1b/tgChat").once('value', cSnap => {
      const chat = cSnap.val();
      if (!chat) return;
      fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({chat_id: String(chat), text, parse_mode:'HTML'})
      }).catch(()=>{});
    }).catch(()=>{});
  }).catch(()=>{});
};

// ── BROADCAST TG TO ALL PARENTS ──────────────────────────────────────────────
// Надсилає повідомлення ВСІМ батькам у Telegram (у кого є tgId в базі)
const broadcastTg = (text) => {
  if (!window._db) return;
  window._db.ref("klas1b/tgToken").once('value', snap => {
    const token = snap.val();
    if (!token) return;
    const send = (chatId) => fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({chat_id: String(chatId), text, parse_mode:'HTML'})
    }).catch(()=>{});

    const doSend = (usernameMap) => {
      // Завжди надсилаємо адміну
      window._db.ref("klas1b/tgChat").once('value', cs => {
        const adminChat = cs.val();
        if (adminChat) send(adminChat);
      }).catch(()=>{});
      // Розсилаємо батькам з tgId, або знайденим через usernameMap
      window._db.ref(`${DB_ROOT}/parents`).once('value', snap2 => {
        const all = snap2.val() ? Object.values(snap2.val()) : [];
        all.filter(p => p).forEach(p => {
          if (p.tgId) {
            send(p.tgId);
          } else if (p.tgUsername && usernameMap) {
            const chatId = usernameMap[(p.tgUsername||"").toLowerCase()];
            if (chatId) {
              send(chatId);
              // Зберігаємо знайдений tgId в Firebase
              window._db.ref(`${DB_ROOT}/parents/${p.id}/tgId`).set(chatId).catch(()=>{});
            }
          }
        });
      }).catch(()=>{});
    };

    // Спочатку отримуємо getUpdates щоб знайти chat_id за username
    fetch(`https://api.telegram.org/bot${token}/getUpdates?limit=100&allowed_updates=%5B%22message%22%5D`)
      .then(r => r.json())
      .then(data => {
        const map = {};
        if (data.ok && data.result) {
          data.result.forEach(upd => {
            const from = upd.message?.from;
            if (from?.username && from?.id) map[from.username.toLowerCase()] = from.id;
          });
        }
        doSend(map);
      })
      .catch(() => doSend(null));
  }).catch(()=>{});
};

const today=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;};
const daysUntil=d=>Math.ceil((new Date(d)-new Date(today()))/86400000);

function Modal({show,onClose,title,children}){
  if(!show)return null;

    <div className="fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center z-50 p-4" onClick={e=>e.target===e.currentTarget&&onClose()}>

function Fld({label,children}){return <div><label className="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">{label}</label>{children}</div>}
function Btn({v="pri",cls="",ch,...p}){

}
function Av({name,photo,sz="md"}){
  const s={sm:"w-8 h-8 text-xs",md:"w-10 h-10 text-sm",lg:"w-12 h-12 text-base"};
  if(photo) return <img src={photo} alt={name} className={`${s[sz]} rounded-full object-cover flex-shrink-0 border-2 border-white shadow`}/>;
  return <div className={`${s[sz]} ${AVT_CLR(name)} rounded-full flex items-center justify-center font-bold flex-shrink-0`}>{INI(name)}</div>;
}
function SL({children}){return <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 mt-5 first:mt-0">{children}</p>}
function Empty({text}){return <div className="text-center py-14 text-slate-400"><div className="text-4xl mb-3">🫙</div><p className="text-sm">{text}</p></div>}
function PhoneNum({phone}){
  const [copied,setCopied]=useState(false);
  if(!phone) return null;
  const copy=e=>{e.stopPropagation();navigator.clipboard?.writeText(phone).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500);}).catch(()=>{});};
  return <button type="button" onClick={copy} className="inline-flex items-center gap-1 text-xs text-slate-500 hover:text-violet-600 transition-colors">{copied?<span className="text-green-600 font-semibold">✓ скопійовано</span>:<><span>📋</span><span>{phone}</span></>}</button>;
}

// ── REGISTRATION ──────────────────────────────────────────────────────────────
function RegScreen({lang,setLang,onReg}){
  const t=L[lang];const r=t.reg;
  // Автоматично беремо TG username та id із WebApp
  const _parseTgUser=()=>{try{const u=window.Telegram?.WebApp?.initDataUnsafe?.user;if(u&&u.id)return u;const raw=window.Telegram?.WebApp?.initData;if(!raw)return null;const p=new URLSearchParams(raw);const s=p.get('user');if(!s)return null;return JSON.parse(s);}catch(e){return null;}};
  const _tgUser=_parseTgUser();
  const tgAutoUser=_tgUser?.username||"";
  const tgAutoId=_tgUser?.id?Number(_tgUser.id):null;
  const [form,setForm]=useState({name:"",phone:"+380",phone2:"+380",child:"",childBirthday:"",role:"parent",pass:"",photo:"",tgUsername:tgAutoUser,tgChatId:tgAutoId?String(tgAutoId):"",skipTg:false});
  const [c1,setC1]=useState(false);const[c2,setC2]=useState(false);
  const [err,setErr]=useState("");const[errNoTg,setErrNoTg]=useState(false);const[showTgHint,setShowTgHint]=useState(false);const[cm,setCm]=useState(null);
  const photoRef=useRef(null);
  const needPass=form.role!=="parent";
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const handlePhoto=e=>{
    const f=e.target.files[0]; if(!f) return;
    const rd=new FileReader();
    rd.onload=ev=>set("photo",ev.target.result);
    rd.readAsDataURL(f);
    e.target.value="";
  };
  const canSubmit=c1&&c2;
  const submit=()=>{
    if(!form.name.trim()||!form.child.trim()){setErr(lang==="ua"?"Заповніть всі обов'язкові поля (ім'я та дитина)":"Заполните все обязательные поля (имя и ребёнок)");return;}
    if(!form.skipTg&&!tgAutoId&&!form.tgUsername.trim()){setErr(lang==="ua"?"Вкажіть Telegram username або натисніть «Пропустити»":"Укажите Telegram username или нажмите «Пропустить»");setErrNoTg(true);return;}
    setErrNoTg(false);
    if(!c1||!c2){setErr(r.err);return;}
    if(needPass&&form.pass!==ROLE_PASSWORDS[form.role]){setErr(r.wrongPass);return;}
    const roleNames={parent:"Батько/Мати",teacher:"Вчитель",admin:"Адміністратор",chairman:"Голова комітету"};
    const tgU=form.tgUsername.replace(/^@/,"").trim();
    const phone2clean=form.phone2&&form.phone2.trim()!=="+380"?form.phone2.trim():"";
    const sendRegNotif=(name,child,birthday,phone,role)=>{
      const msg=`🆕 <b>Нова реєстрація — 1Б клас</b>\n\n👤 <b>${name}</b>\n👦 Дитина: ${child}${birthday?"\n🎂 Д/н: "+birthday:""}\n📞 Тел: ${phone||"—"}\n🏷 Роль: ${roleNames[role]}\n🕐 ${new Date().toLocaleString("uk-UA")}`;
      if(window._db){
        window._db.ref("klas1b").once("value",snap=>{
          const cfg=snap.val();
          if(cfg&&cfg.tgToken&&cfg.tgChat){
            fetch(`https://api.telegram.org/bot${cfg.tgToken}/sendMessage`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({chat_id:String(cfg.tgChat),text:msg,parse_mode:"HTML"})}).catch(()=>{});
          }
        }).catch(()=>{});
      } else sendTgMsg(msg);
    };
    const doReg=(finalId, existing)=>{
      const finalTgId=tgAutoId||(form.tgChatId.trim()?Number(form.tgChatId.trim()):null)||null;
      const u={id:finalId,name:existing?existing.name:form.name,phone:existing?existing.phone:form.phone,child:existing?existing.child:form.child,childRu:existing?existing.child:form.child,childBirthday:form.childBirthday,role:existing?existing.role:form.role,photo:form.photo||existing?.photo||"",tgUsername:tgU,tgId:finalTgId};
      localStorage.setItem("rc_user",JSON.stringify(u));
      if(window._db){
        if(existing){
          // Оновлюємо існуючий запис — лише змінені поля
          const upd={tgUsername:tgU,tgId:finalTgId||null,registeredAt:Date.now()};
          if(phone2clean) upd.phone2=phone2clean;
          if(form.photo) upd.photo=form.photo;
          window._db.ref(`${DB_ROOT}/parents/${finalId}`).update(upd).catch(()=>{});
          // Повідомляємо тільки якщо перша реєстрація (ще не було tgUsername)
          if(!existing.tgUsername) sendRegNotif(existing.name,existing.child,form.childBirthday,existing.phone,existing.role);
        } else {
          // Новий запис
          window._db.ref(`${DB_ROOT}/parents/${finalId}`).set({
            id:finalId,name:form.name,nameRu:form.name,child:form.child,childRu:form.child,
            childBirthday:form.childBirthday,phone:form.phone,phone2:phone2clean,
            role:form.role,photo:form.photo||"",tgUsername:tgU,tgId:finalTgId||null,
            comment:"",registeredAt:Date.now()
          }).catch(()=>{});
          sendRegNotif(form.name,form.child,form.childBirthday,form.phone,form.role);
        }
      }
      requestNotifPerm();
      onReg(u);
    };
    // Шукаємо по phone1 або phone2 — щоб не дублювати
    if(window._db){
      window._db.ref(`${DB_ROOT}/parents`).once('value',snap=>{
        const all=snap.val()?Object.values(snap.val()):[];
        // Останні 9 цифр — щоб 0961234567 = 380961234567 = +380961234567
        const normalize=s=>{const d=(s||"").replace(/\D/g,"");return d.length>=9?d.slice(-9):d;};
        const normName=s=>(s||"").toLowerCase().replace(/\s+/g," ").trim();
        const ph1=normalize(form.phone);
        const ph2=normalize(phone2clean);
        const existing=all.find(p=>{
          const ep=normalize(p.phone); const ep2=normalize(p.phone2||"");
          const phoneMatch=(ph1&&ep&&ep===ph1)||(ph1&&ep2&&ep2===ph1)||(ph2&&ep&&ep===ph2)||(ph2&&ep2&&ep2===ph2);
          const nameMatch=normName(p.name)===normName(form.name);
          return phoneMatch||nameMatch;
        });
        if(existing) doReg(existing.id,existing);
        else doReg(Date.now(),null);
      }).catch(()=>doReg(Date.now(),null));
    } else {
      doReg(Date.now(),null);
    }
  };
  return(
    <div className="min-h-screen flex flex-col items-center justify-center p-4" style={{background:"linear-gradient(135deg,#f0f4ff 0%,#faf0ff 100%)"}}>
      <div className="absolute top-4 right-4 flex gap-1 bg-white/80 border border-white rounded-xl p-1 backdrop-blur shadow-sm">
        {["ua","ru"].map(l=><button key={l} onClick={()=>setLang(l)} className={`px-3 py-1 rounded-lg text-xs font-bold transition-all ${lang===l?"bg-gradient-to-r from-violet-600 to-indigo-600 text-white shadow":"text-slate-500"}`}>{l.toUpperCase()}</button>)}
      </div>
      <div className="w-full max-w-sm">
        <div className="text-center mb-8">
          <div className="w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-violet-300/50" style={{background:"linear-gradient(135deg,#7c3aed,#4f46e5)"}}>
            <span className="text-white text-3xl font-black">1Б</span>
          </div>
          <h1 className="text-2xl font-black text-slate-900">{r.welcome}</h1>
          <p className="text-slate-500 text-sm mt-1">{r.sub}</p>
          <p className="text-violet-600 text-sm font-semibold mt-1">{t.school}</p>
        </div>
        <div className="bg-white rounded-3xl shadow-xl shadow-slate-200/80 p-6 space-y-4">
          {/* Photo */}
          <Fld label={r.photo}>
            <div className="flex items-center gap-3">
              <div className="w-14 h-14 rounded-full overflow-hidden bg-violet-100 flex items-center justify-center flex-shrink-0 cursor-pointer border-2 border-dashed border-violet-300" onClick={()=>photoRef.current&&photoRef.current.click()}>
                {form.photo?<img src={form.photo} className="w-full h-full object-cover" alt=""/>:<span className="text-2xl">📷</span>}
              </div>
              <input ref={photoRef} type="file" accept="image/*" className="hidden" onChange={handlePhoto}/>
              <button onClick={()=>photoRef.current&&photoRef.current.click()} className="text-xs text-violet-600 font-semibold hover:underline">{form.photo?"Змінити фото":"Обрати фото"}</button>
            </div>
          </Fld>
          <Fld label={r.name}><input className={INP} placeholder={r.name} value={form.name} onChange={e=>set("name",e.target.value)}/></Fld>
          <Fld label={r.phone}><input className={INP} placeholder="+380 00 000 00 00" value={form.phone} onChange={e=>{const v=e.target.value;set("phone",v.startsWith("+380")?v:"+380");}}/></Fld>
          <Fld label={lang==="ua"?"Додатковий телефон (необов'язково)":"Дополнительный телефон (необязательно)"}><input className={INP} placeholder="+380 00 000 00 00" value={form.phone2} onChange={e=>{const v=e.target.value;set("phone2",v.startsWith("+380")?v:"+380");}}/></Fld>
          <Fld label={r.child}><input className={INP} placeholder={r.child} value={form.child} onChange={e=>set("child",e.target.value)}/></Fld>
          <Fld label={r.childBday}><input className={INP} type="date" value={form.childBirthday} onChange={e=>set("childBirthday",e.target.value)}/></Fld>
          <Fld label={lang==="ua"?`Telegram юзернейм${form.skipTg?"":" *"}`:` Telegram username${form.skipTg?"":" *"}`}>
            {form.skipTg
              ? <div className="flex items-center gap-2">
                  <div className={`${INP} flex-1 bg-slate-50 text-slate-400 text-sm`}>{lang==="ua"?"Без юзернейму — сповіщення не надходитимуть":"Без username — уведомления не будут приходить"}</div>
                  <button type="button" onClick={()=>set("skipTg",false)} className="text-xs text-violet-600 hover:text-violet-800 font-semibold whitespace-nowrap underline underline-offset-2">{lang==="ua"?"Вказати":"Указать"}</button>
                </div>
              : <>
                  <div className="relative">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">@</span>

              <li>{lang==="ua"?"Додайте username та збережіть":"Добавьте username и сохраните"}</li>
              <li>{lang==="ua"?"Поверніться в бот і зареєструйтесь":"Вернитесь в бот и зарегистрируйтесь"}</li>
            </ol>
            <p className="text-blue-600 font-medium">{lang==="ua"?"↘️ Натисніть стрілку вниз (поряд з ⋮) вгорі — щоб згорнути":"↘️ Нажмите стрелку вниз (рядом с ⋮) вверху — чтобы свернуть"}</p>
          </div>}
          <button
            onClick={submit}
            disabled={!canSubmit}
            className={`w-full py-3 rounded-xl text-sm font-bold transition-all ${canSubmit?"bg-gradient-to-r from-violet-600 to-indigo-600 text-white shadow-md shadow-violet-200 hover:from-violet-700 hover:to-indigo-700":"bg-slate-200 text-slate-400 cursor-not-allowed"}`}
          >{r.submit}</button>

    </div>
  );

  const [pass,setPass]=useState("");
  const [err,setErr]=useState("");
  const roles=L[lang].roles;
  const submit=()=>{
    if(role===user.role){onClose();return;}
    if(role==="parent"){
      // Повернення до ролі "батько" — без паролю
      const u={...user,role:"parent"};
      localStorage.setItem("rc_user",JSON.stringify(u));
      onRoleChange(u);onClose();return;
    }
    if(!ROLE_PASSWORDS[role]||pass!==ROLE_PASSWORDS[role]){
      setErr(ua?"Невірний пароль":"Неверный пароль");return;
    }
    const u={...user,role};
    localStorage.setItem("rc_user",JSON.stringify(u));
    onRoleChange(u);onClose();
  };
  return(
    <Modal show={true} onClose={onClose} title={ua?"Змінити роль":"Сменить роль"}>
      <div className="space-y-4">
        <div>
          <label className="block text-xs font-semibold text-slate-500 mb-1">{ua?"Нова роль":"Новая роль"}</label>
          <select className={INP} value={role} onChange={e=>{setRole(e.target.value);setPass("");setErr("");}}>
            {Object.entries(roles).map(([k,v])=><option key={k} value={k}>{v}</option>)}
          </select>
        </div>
        {role!=="parent"&&role!==user.role&&(
          <div>
            <label className="block text-xs font-semibold text-slate-500 mb-1">{ua?"Пароль ролі":"Пароль роли"}</label>
            <input className={INP} type="password" placeholder={ua?"Введіть пароль":"Введите пароль"} value={pass} onChange={e=>setPass(e.target.value)}/>
          </div>
        )}
        {err&&<p className="text-rose-500 text-xs font-medium">{err}</p>}
        <div className="flex gap-2 pt-1">
          <Btn onClick={onClose} cls="flex-1 text-center justify-center bg-slate-100 text-slate-700 hover:bg-slate-200">{ua?"Скасувати":"Отмена"}</Btn>
          <Btn onClick={submit} cls="flex-1 text-center justify-center">{ua?"Підтвердити":"Подтвердить"}</Btn>
        </div>
      </div>
    </Modal>
  );
}

function App(){
  const[lang,setLang]=useState(()=>localStorage.getItem("rc_lang")||"ua");
  const[user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem("rc_user"))||null;}catch(e){return null;}});
  const[showRoleModal,setShowRoleModal]=useState(false);
  useEffect(()=>localStorage.setItem("rc_lang",lang),[lang]);
  useEffect(()=>{const tg=window.Telegram&&window.Telegram.WebApp;if(tg){tg.ready();tg.expand();};},[]);
  const handleLogout=()=>{
    if(!window.confirm(lang==="ua"?"Вийти з акаунту?":"Выйти из аккаунта?")) return;
    localStorage.removeItem("rc_user");
    localStorage.removeItem("rc_seen");
    setUser(null);
  };
  if(!user)return<RegScreen lang={lang} setLang={setLang} onReg={u=>setUser(u)}/>;
  return(
    <>
      <MainApp lang={lang} setLang={setLang} user={user} onChangeRole={()=>setShowRoleModal(true)} onLogout={handleLogout}/>
      {showRoleModal&&<ChangeRoleModal lang={lang} user={user} onClose={()=>setShowRoleModal(false)} onRoleChange={u=>setUser(u)}/>}
    </>
  );
}

  const saveNeed=()=>{if(!editNeed)return;setNeeds(p=>p.map(n=>n.id!==editNeed.id?n:{...n,item:editNeed.item,itemRu:editNeed.item,qty:editNeed.qty,desc:editNeed.desc,descRu:editNeed.desc}));setEditNeed(null);setModal(null);};
  // ann media upload
  const handleMedia=e=>{const files=e.target.files;if(!files||!files.length)return;Array.from(files).forEach(f=>{const isVid=f.type.startsWith("video/");if(isVid){const url=URL.createObjectURL(f);setAnn(p=>[{id:Date.now()+Math.floor(Math.random()*1000),title:ua?"Відео":"Видео",titleRu:"Видео",text:"",textRu:"",media:url,mediaType:"video",date:today(),author:user.name,pinned:false},...p]);}else{const rd=new FileReader();rd.onload=ev=>setAnn(p=>[{id:Date.now()+Math.floor(Math.random()*1000),title:ua?"Фото":"Фото",titleRu:"Фото",text:"",textRu:"",media:ev.target.result,mediaType:"image",date:today(),author:user.name,pinned:false},...p]);rd.readAsDataURL(f);}});e.target.value="";};

  const togglePay=(cId,pId)=>setColls(p=>p.map(c=>{
    if(c.id!==cId) return c;
    const pm=c.payments.find(x=>x.id===pId);
    if(!pm) return c;
    const delta=pm.paid?-c.amount:c.amount;
    if(window._db) window._db.ref("klas1b/stats/totalCollected").transaction(v=>(v||0)+delta).catch(()=>{});
    return {...c,payments:c.payments.map(x=>x.id!==pId?x:{...x,paid:!x.paid})};
  }));
  const updateColAmt=(id,amt)=>{if(!amt||isNaN(+amt)||+amt<=0)return;setColls(p=>p.map(c=>c.id!==id?c:{...c,amount:+amt}));setEditColAmt(null);};
  const closeCol=(id)=>{setColls(p=>p.map(c=>c.id!==id?c:{...c,closed:true}));markDone("closedColls");};
  const delCol=(id)=>{
    const col=colls.find(c=>c.id===id);
    if(col&&window._db){const paid=col.payments.filter(p=>p.paid).length*col.amount;if(paid>0)window._db.ref("klas1b/stats/totalCollected").transaction(v=>(v||0)-paid).catch(()=>{});}
    setColls(p=>p.filter(c=>c.id!==id));
  };
  const addColPhoto=(id,src)=>{setColls(p=>p.map(c=>c.id!==id?c:{...c,photos:[...toArr(c.photos),{id:Date.now()+Math.floor(Math.random()*1000),src,by:user.name,date:today()}]}));};
  const delColPhoto=(colId,phId)=>{setColls(p=>p.map(c=>c.id!==colId?c:{...c,photos:toArr(c.photos).filter(ph=>ph.id!==phId)}));};
  const handleColPhoto=e=>{const f=e.target.files?.[0];if(!f||!activeColId)return;const rd=new FileReader();rd.onload=ev=>addColPhoto(activeColId,ev.target.result);rd.readAsDataURL(f);e.target.value="";setActiveColId(null);};
  const joinVol=id=>setEvents(p=>p.map(e=>{const v=e.vol||[];return e.id!==id||v.includes(user.name)?e:{...e,vol:[...v,user.name]};}));
  const leaveVol=id=>setEvents(p=>p.map(e=>e.id!==id?e:{...e,vol:(e.vol||[]).filter(n=>n!==user.name)}));
  // voted зберігається у Firebase всередині опитування (voters: {userId: optIdx})
  // Це не залежить від пристрою чи виходу з акаунту
  const vote=(pid,idx)=>{
    const uid=String(user.id||user.phone||user.name);
    setPolls(p=>p.map(pl=>{
      if(pl.id!==pid) return pl;
      const voters=pl.voters||{};
      if(voters[uid]!==undefined) return pl; // вже голосував
      return{...pl,votes:pl.votes.map((v,i)=>i===idx?v+1:v),voters:{...voters,[uid]:idx}};
    }));
  };
  const helpNeed=id=>{
    setNeeds(p=>p.map(n=>{
      if(n.id!==id) return n;
      const h=toArr(n.helpers);
      if(h.includes(user.name)) return n;
      return {...n,helpers:[...h,user.name]};
    }));
  };
  const helpReq=id=>{setHelpReqs(p=>p.map(h=>{if(h.id!==id)return h;const hh=toArr(h.helpers);if(hh.includes(user.name))return h;if(window._db&&user.id)window._db.ref(`klas1b/helpCounts/${user.id}`).transaction(v=>(v||0)+1).catch(()=>{});return{...h,helpers:[...hh,user.name]};}));  };

  const handlePhoto=e=>{
    const files=e.target.files;if(!files||!files.length)return;
    Array.from(files).forEach(f=>{
      const rd=new FileReader();
      rd.onload=ev=>setPhotos(p=>[{id:Date.now()+Math.floor(Math.random()*1000),src:ev.target.result,name:f.name,by:user.name,date:today()},...p]);
      rd.readAsDataURL(f);
    });
    e.target.value="";
  };

  const upEv=events.filter(e=>e.date>=today());
  const pastEv=events.filter(e=>e.date<today());
  const filtPar=parents.filter(p=>{const q=psearch.toLowerCase();return(ua?p.name:p.nameRu).toLowerCase().includes(q)||(ua?p.child:p.childRu).toLowerCase().includes(q);}).sort((a,b)=>{const SEED_MAX=1000029;const now=Date.now();const aNew=(a.registeredAt?(now-a.registeredAt<7200000):Number(a.id)>SEED_MAX)?1:0;const bNew=(b.registeredAt?(now-b.registeredAt<7200000):Number(b.id)>SEED_MAX)?1:0;if(bNew!==aNew)return bNew-aNew;return(ua?a.name:a.nameRu).localeCompare(ua?b.name:b.nameRu,"uk");});

  // ── BADGE COUNTERS (нові елементи у вкладках) ─────────────────────────────
  const [seenCounts,setSeenCounts]=useState(()=>{try{return JSON.parse(localStorage.getItem("rc_seen"))||{};}catch(e){return{};}});
  // Поточна кількість елементів у кожній вкладці
  const tabCounts={
    ann:ann.length, fin:colls.length+exps.length, ev:events.length,
    par:parents.length, pol:polls.length,
    doc:docsData.length+teachers.length+schedule.length,
    photo:photos.length, needs:needs.length, help:helpReqs.length,
    top:topSt.length+topPar.length,
  };
  // Коли відкриваємо вкладку — зберігаємо поточну кількість як "переглянуто"
  useEffect(()=>{
    setSeenCounts(prev=>{
      const next={...prev,[tab]:tabCounts[tab]};
      localStorage.setItem("rc_seen",JSON.stringify(next));
      return next;
    });
  },[tab,tabCounts[tab]]);
  // Кількість нових (unseen) елементів.
  // Якщо id ще не відстежувався (перший запуск) — вважаємо все переглянутим (0 badge)
  const newBadge=id=>{
    if(seenCounts[id]===undefined) return 0;
    return Math.max(0,tabCounts[id]-seenCounts[id]);
  };

  const TABS=[
    {id:"ann",icon:"📢",label:t.tabs.ann},
    {id:"fin",icon:"💰",label:t.tabs.fin},
    {id:"ev",icon:"📅",label:t.tabs.ev},
    {id:"par",icon:"👥",label:t.tabs.par},
    {id:"pol",icon:"🗳",label:t.tabs.pol},
    {id:"doc",icon:"📄",label:t.tabs.doc},
    {id:"photo",icon:"📸",label:t.tabs.photo},
    {id:"needs",icon:"📋",label:t.tabs.needs},
    {id:"help",icon:"🤝",label:t.tabs.help},
    {id:"top",icon:"🏆",label:t.tabs.top},
  ];

  return(
    <div className="min-h-screen bg-slate-100">
      {/* HEADER */}
      <header className="sticky top-0 z-30" style={{background:"linear-gradient(135deg,#6d28d9 0%,#4f46e5 60%,#2563eb 100%)"}}>
        <div className="max-w-2xl mx-auto px-4 pt-4 pb-2">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-white text-base font-black leading-tight">{t.app}</h1>
              <p className="text-violet-200 text-xs font-medium">{t.school}</p>
            </div>
            <div className="flex items-center gap-2">
              <div className="flex gap-0.5 bg-white/10 rounded-xl p-1">
                {["ua","ru"].map(l=><button key={l} onClick={()=>setLang(l)} className={`px-2.5 py-1 rounded-lg text-xs font-black transition-all ${lang===l?"bg-white text-violet-700 shadow":"text-white/70 hover:text-white"}`}>{l.toUpperCase()}</button>)}
              </div>
              {(user.role==="chairman"||user.role==="admin")&&<button onClick={()=>setShowStats(true)} title={ua?"Статистика":"Статистика"} className="w-9 h-9 rounded-full flex items-center justify-center text-white bg-white/15 hover:bg-white/25 transition-all text-base" style={{flexShrink:0}}>📊</button>}
              <button onClick={onChangeRole} title={ua?"Змінити роль":"Сменить роль"} className="w-9 h-9 rounded-full flex items-center justify-center text-white bg-white/15 hover:bg-white/25 transition-all text-base" style={{flexShrink:0}}>🔑</button>
              <button onClick={onLogout} title={ua?"Вийти":"Выйти"} className="w-9 h-9 rounded-full flex items-center justify-center text-white bg-white/15 hover:bg-red-400/50 transition-all text-base" style={{flexShrink:0}}>🚪</button>
              <div className="flex flex-col items-center gap-0.5 flex-shrink-0">
                {user.photo?<img src={user.photo} alt={user.name} className="w-9 h-9 rounded-full object-cover border-2 border-white/50 shadow-lg"/>:<div className={`w-9 h-9 rounded-full flex items-center justify-center text-xs font-black shadow-lg ${AVT_CLR(user.name)}`}>{INI(user.name)}</div>}
                <span className="text-[9px] font-bold text-white/80 leading-none whitespace-nowrap" style={{maxWidth:"48px",overflow:"hidden",textOverflow:"ellipsis"}}>{t.roles[user.role]||user.role}</span>
              </div>
            </div>
          </div>
          {upBday&&<div className="mt-2 bg-white/15 backdrop-blur rounded-xl px-3 py-2 flex items-center gap-2"><span className="text-base">🎂</span><span className="text-white/90 text-xs font-medium">{ua?upBday.n:upBday.nRu} — {upBday.days===0?t.ev.today:t.ev.inDays.replace("{n}",upBday.days)}</span></div>}
        </div>
        {/* TABS */}
        <div className="bg-white border-b border-slate-200 mt-2">
          <div className="max-w-2xl mx-auto flex overflow-x-auto noscroll">
            {TABS.map(tb=>{const badge=newBadge(tb.id);return(
              <button key={tb.id} onClick={()=>setTab(tb.id)} className={`flex-shrink-0 flex flex-col items-center px-3 py-2 border-b-2 transition-all relative ${tab===tb.id?"border-violet-600 text-violet-600":"border-transparent text-slate-400 hover:text-slate-600"}`}>
                <span className="tab-icon">{tb.icon}</span>
                <span className="text-[10px] font-bold mt-0.5 whitespace-nowrap">{tb.label}{badge>0&&<span className="ml-0.5 inline-flex items-center justify-center bg-rose-500 text-white rounded-full font-black" style={{fontSize:"9px",minWidth:"14px",height:"14px",padding:"0 3px",verticalAlign:"middle",lineHeight:"14px"}}>+{badge}</span>}</span>
              </button>
            )})}
          </div>
        </div>
      </header>

      <main className="max-w-2xl mx-auto p-3 pb-10">

      {/* ─── ОГОЛОШЕННЯ ─────────────────────────────────────────────── */}
      {tab==="ann"&&(
        <div>
          <div className="flex justify-between items-center mb-3">
            <h2 className="font-black text-slate-800 text-lg">{t.ann.title}</h2>
            {canPost&&<div className="flex gap-2">
              <button onClick={()=>mediaRef.current&&mediaRef.current.click()} className="flex items-center gap-1 bg-pink-100 text-pink-700 hover:bg-pink-200 px-3 py-2 rounded-xl text-xs font-bold transition-colors">📎 {ua?"Медіа":"Медиа"}</button>
              <input ref={mediaRef} type="file" accept="image/*,video/*" multiple className="hidden" onChange={handleMedia}/>
              <Btn onClick={()=>setModal("ann")}>{t.ann.add}</Btn>
            </div>}
          </div>
          {!canPost&&<div className="bg-amber-50 border border-amber-200 rounded-2xl p-3 mb-3 text-xs text-amber-700 font-medium">{t.ann.noAccess}</div>}
          {ann.length===0&&<Empty text={t.ann.noItems}/>}
          <div className="space-y-3">
            {[...ann].sort((a,b)=>b.pinned-a.pinned).map(a=>(
              <div key={a.id} className="card">
                {a.pinned&&<div className="h-1 grad-violet"/>}
                <div className="card-inner">
                  {a.pinned&&<span className="text-xs font-bold text-violet-500 block mb-1">📌 {t.ann.pin}</span>}
                  <div className="flex justify-between items-start gap-2">
                    <h3 className="font-bold text-slate-900">{ua?a.title:a.titleRu}</h3>
                    {canPost&&<div className="flex gap-1 flex-shrink-0">
                      <button onClick={()=>setAnn(p=>p.map(x=>x.id===a.id?{...x,pinned:!x.pinned}:x))} className="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-violet-100 text-slate-400 hover:text-violet-600 text-sm transition-colors">📌</button>
                      <button onClick={()=>{setEditAnn({...a});setModal("editAnn");}} className="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-blue-100 text-slate-400 hover:text-blue-500 text-sm transition-colors">✏️</button>
                      <button onClick={()=>setAnn(p=>p.filter(x=>x.id!==a.id))} className="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-500 text-sm transition-colors">✕</button>
                    </div>}
                  </div>
                  {a.media&&a.mediaType==="image"&&<img src={a.media} alt="" className="w-full rounded-xl mt-2 object-cover max-h-60"/>}
                  {a.media&&a.mediaType==="video"&&<video src={a.media} controls className="w-full rounded-xl mt-2 max-h-60" style={{maxHeight:"240px"}}/>}
                  {(ua?a.text:a.textRu)&&<p className="text-slate-600 text-sm mt-1.5 leading-relaxed">{ua?a.text:a.textRu}</p>}
                  {a.callToHelp&&(()=>{const ah=toArr(a.helpers);const iH=ah.includes(user.name);return(<div className="mt-3 pt-2.5 border-t border-rose-100"><div className="flex items-center justify-between gap-2"><span className="text-xs text-rose-500 font-semibold">🤝 {ah.length} {ua?"відгукнулись":"откликнулись"}</span><div className="flex items-center gap-2">{a.resolved?<span className="text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-xl">✅ {ua?"Вирішено":"Решено"}</span>:<>{iH?<span className="text-xs font-bold text-rose-400 bg-rose-50 px-3 py-1.5 rounded-xl">✓ {ua?"Я відгукнувся":"Я откликнулся"}</span>:<button onClick={()=>{setAnn(p=>p.map(x=>x.id!==a.id?x:{...x,helpers:[...ah,user.name]}));if(window._db&&user.id)window._db.ref(`klas1b/helpCounts/${user.id}`).transaction(v=>(v||0)+1).catch(()=>{});}} className="text-xs font-bold px-3 py-1.5 rounded-xl bg-rose-500 text-white hover:bg-rose-600 transition-colors">{ua?"🙋 Відгукнутись":"🙋 Откликнуться"}</button>}{user.role==="chairman"&&<button onClick={()=>{setAnn(p=>p.map(x=>x.id!==a.id?x:{...x,resolved:true}));markDone("resolvedCount");}} className="text-xs font-bold px-3 py-1.5 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition-colors">✅ {ua?"Вирішено":"Решено"}</button>}</> }</div></div></div>);})()}
                  <div className="flex justify-between mt-3 pt-2.5 border-t border-slate-50 text-xs text-slate-400"><span>{a.author}</span><span>{a.date}</span></div>
                </div>
              </div>
            ))}
          </div>
          <Modal show={modal==="ann"} onClose={()=>setModal(null)} title={t.ann.new}>
            <div className="space-y-3">
              <Fld label={t.ann.fTitle}><input className={INP} value={fAnn.title} onChange={e=>setFAnn(f=>({...f,title:e.target.value}))}/></Fld>
              <Fld label={t.ann.fText}><textarea className={INP} rows={4} value={fAnn.text} onChange={e=>setFAnn(f=>({...f,text:e.target.value}))}/></Fld>
              <label className={`flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-colors ${fAnn.callToHelp?"bg-rose-50 border border-rose-200":"bg-slate-50 border border-slate-200"}`}>
                <input type="checkbox" checked={fAnn.callToHelp} onChange={e=>setFAnn(f=>({...f,callToHelp:e.target.checked}))} className="w-4 h-4 accent-rose-500"/>
                <div><p className="text-sm font-bold text-slate-700">🤝 {ua?"Заклик до допомоги":"Призыв к помощи"}</p><p className="text-xs text-slate-500">{ua?"Батьки зможуть відгукнутися і отримають + у рейтинг":"Родители смогут откликнуться и получат + в рейтинг"}</p></div>
              </label>
              <div className="flex gap-2 pt-1"><Btn cls="flex-1 text-center" onClick={addAnn}>{t.ann.pub}</Btn><Btn v="sec" onClick={()=>setModal(null)}>{t.common.cancel}</Btn></div>
            </div>
          </Modal>
          <Modal show={modal==="editAnn"} onClose={()=>{setModal(null);setEditAnn(null);}} title={ua?"Редагувати оголошення":"Редактировать объявление"}>
            {editAnn&&<div className="space-y-3">
              <Fld label={t.ann.fTitle}><input className={INP} value={editAnn.title} onChange={e=>setEditAnn(f=>({...f,title:e.target.value}))}/></Fld>
              <Fld label={t.ann.fText}><textarea className={INP} rows={4} value={editAnn.text} onChange={e=>setEditAnn(f=>({...f,text:e.target.value}))}/></Fld>
              <div className="flex gap-2 pt-1"><Btn cls="flex-1 text-center" onClick={saveAnn}>{ua?"Зберегти":"Сохранить"}</Btn><Btn v="sec" onClick={()=>{setModal(null);setEditAnn(null);}}>{t.common.cancel}</Btn></div>
            </div>}
          </Modal>
        </div>
      )}

      {/* ─── ФІНАНСИ ─────────────────────────────────────────────────── */}
      {tab==="fin"&&(
        <div>
          <h2 className="font-black text-slate-800 text-lg mb-3">{t.fin.title}</h2>
          <div className="grid grid-cols-3 gap-2 mb-4">
            {[[t.fin.coll,totColl,"grad-emerald"],[t.fin.spent,totExp,"grad-amber"],[t.fin.bal,totColl-totExp,"grad-violet"]].map(([lbl,val,gr])=>(
              <div key={lbl} className={`${gr} rounded-2xl p-3 text-center shadow-lg`}>
                <div className="text-white text-lg font-black">{val.toLocaleString()}</div>
                <div className="text-white/70 text-xs mt-0.5">{lbl} {t.cur}</div>
              </div>
            ))}
          </div>
          <div className="flex bg-white rounded-2xl p-1 mb-4 shadow-sm">
            {[[t.fin.tColl,"coll"],[t.fin.tExp,"exp"]].map(([lbl,k])=>(
              <button key={k} onClick={()=>setFinTab(k)} className={`flex-1 py-2 rounded-xl text-sm font-bold transition-all ${finTab===k?"bg-gradient-to-r from-violet-600 to-indigo-600 text-white shadow":"text-slate-500"}`}>{lbl}</button>
            ))}
          </div>
          {finTab==="coll"&&(
            <div>
              {canFin&&<div className="flex justify-end mb-2"><Btn v="ghost" onClick={()=>setModal("col")}>{t.fin.newColl}</Btn></div>}
              {!canFin&&colls.length===0&&<Empty text={ua?"Зборів поки немає":"Сборов пока нет"}/>}
              <input ref={colPhotoRef} type="file" accept="image/*" className="hidden" onChange={handleColPhoto}/>
              <div className="space-y-3">
                {colls.map(col=>{
                  const pd=col.payments.filter(p=>p.paid).length;const pct=col.payments.length?Math.round(pd/col.payments.length*100):0;
                  const colPhotos=toArr(col.photos);
                  return(
                    <div key={col.id} className="card">
                      <div className="h-1.5" style={{background:col.closed?"linear-gradient(90deg,#6b7280,#9ca3af)":"linear-gradient(90deg,#10b981,#0891b2)"}}/>
                      <div className="card-inner">
                        <div className="flex items-start justify-between gap-2 mb-2">
                          <span className="font-bold text-slate-800 flex-1">{ua?col.name:col.nameRu}</span>
                          <div className="flex items-center gap-1.5 flex-shrink-0 flex-wrap justify-end">
                            {canFin&&editColAmt?.id===col.id
                              ?<input autoFocus type="number" className="w-20 text-right text-emerald-600 font-black text-sm border-2 border-emerald-300 rounded-lg px-1.5 py-0.5 outline-none" value={editColAmt.val} onChange={e=>setEditColAmt(v=>({...v,val:e.target.value}))} onBlur={()=>updateColAmt(col.id,editColAmt.val)} onKeyDown={e=>{if(e.key==='Enter')updateColAmt(col.id,editColAmt.val);if(e.key==='Escape')setEditColAmt(null);}}/>
                              :<button onClick={()=>canFin&&!col.closed&&setEditColAmt({id:col.id,val:col.amount})} className={`font-black text-sm ${col.closed?"text-slate-400":"text-emerald-600"} ${canFin&&!col.closed?"hover:underline cursor-pointer":""}`}>{col.amount} {t.cur}{t.fin.pp}</button>
                            }
                            {col.closed
                              ?<span className="text-xs font-bold px-2 py-0.5 rounded-full bg-slate-100 text-slate-500">✅ {ua?"Завершений":"Завершён"}</span>
                              :canFin&&<button onClick={()=>{if(window.confirm(ua?"Завершити цей збір?":"Завершить этот сбор?"))closeCol(col.id);}} className="text-xs font-bold px-2 py-1 rounded-full bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 transition-colors">{ua?"Завершити":"Завершить"}</button>
                            }
                            {(canFin||user.role==="chairman")&&<button onClick={()=>{if(window.confirm(ua?"Видалити цей збір?":"Удалить этот сбор?"))delCol(col.id);}} className="w-6 h-6 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-500 text-xs transition-colors">✕</button>}
                          </div>
                        </div>
                        <div className="flex items-center gap-2 mb-3">
                          <div className="flex-1 bg-slate-100 rounded-full h-2"><div className={`h-2 rounded-full transition-all ${col.closed?"bg-slate-400":"bg-gradient-to-r from-emerald-400 to-teal-500"}`} style={{width:`${pct}%`}}/></div>
                          <span className="text-xs font-bold text-slate-500">{pd}/{col.payments.length}</span>
                        </div>

                        {canPost&&<button onClick={()=>setNeeds(p=>p.filter(x=>x.id!==n.id))} className="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-500 text-sm transition-colors">✕</button>}

                    <div className="mt-3 pt-3 border-t border-slate-50 flex items-center justify-between">

              <Fld label={t.needs.desc}><input className={INP} value={fNeed.desc} onChange={e=>setFNeed(f=>({...f,desc:e.target.value}))}/></Fld>

            </div>
          </Modal>
          <Modal show={modal==="editNeed"} onClose={()=>{setModal(null);setEditNeed(null);}} title={ua?"Редагувати потребу":"Редактировать нужду"}>

              <Fld label={t.needs.item}><input className={INP} value={editNeed.item} onChange={e=>setEditNeed(f=>({...f,item:e.target.value}))}/></Fld>

            </div>}
          </Modal>
        </div>

      {/* ─── ДОПОМОГА ─────────────────────────────────────────────────── */}
      {tab==="help"&&(
        <div>

            <p className="text-white/80 text-sm mt-1">{t.help.sub}</p>
            <button onClick={()=>setModal("help")} className="mt-3 bg-white/20 hover:bg-white/30 text-white font-bold px-4 py-2 rounded-xl text-sm transition-colors border border-white/30">
              + {t.help.add}
            </button>
          </div>
          {helpReqs.length===0&&<Empty text={t.help.noItems}/>}
          <div className="space-y-3">

                      <span className={`text-xs font-bold px-2.5 py-1 rounded-full ${HELP_COLORS[h.type]||HELP_COLORS.other}`}>{t.help.types[h.type]}</span>
                      <p className="font-bold text-slate-800 mt-2">{h.anon?(ua?"Анонімно":"Анонимно"):ua?h.name:h.nameRu}</p>

                      <span className="text-xs text-slate-400">{h.date}</span>
                      {canPost&&<button onClick={()=>setHelpReqs(p=>p.filter(x=>x.id!==h.id))} className="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-500 text-sm transition-colors">✕</button>}
                    </div>
                  </div>
                  <p className="text-slate-600 text-sm leading-relaxed">{ua?h.desc:h.descRu}</p>
                  {h.contact&&<p className="text-xs text-slate-400 mt-1.5">📞 {h.contact}</p>}
                  {(()=>{const hh=toArr(h.helpers);const iH=hh.includes(user.name);const isOwn=!h.anon&&h.name===user.name;return(<div className="mt-3 pt-3 border-t border-slate-50 flex items-center justify-between gap-2"><span className="text-xs text-slate-400">{hh.length} {t.help.helped}</span><div className="flex items-center gap-2">{h.resolved?<span className="text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-xl">✅ {ua?"Вирішено":"Решено"}</span>:<>{user.role==="chairman"&&<button onClick={()=>{setHelpReqs(p=>p.map(x=>x.id!==h.id?x:{...x,resolved:true}));markDone("helpDone");}} className="text-xs font-bold px-3 py-1.5 rounded-xl bg-emerald-100 text-emerald-700 hover:bg-emerald-200 transition-colors">✅</button>}{isOwn?<span className="text-xs text-slate-400 italic">{ua?"Мій запит":"Мой запрос"}</span>:iH?<span className="text-xs font-bold text-rose-400 bg-rose-50 px-3 py-1.5 rounded-xl">✓ {ua?"Я відгукнувся":"Я откликнулся"}</span>:<button onClick={()=>helpReq(h.id)} className="text-xs font-bold px-3 py-1.5 rounded-xl bg-rose-50 text-rose-600 hover:bg-rose-100 transition-colors">{t.help.canHelp}</button>}</>}</div></div>);})()}
                </div>
              </div>
            ))}
          </div>
          <Modal show={modal==="help"} onClose={()=>setModal(null)} title={t.help.newReq}>
            <div className="space-y-3">
              <Fld label={t.help.typeL}><select className={INP} value={fHelp.type} onChange={e=>setFHelp(f=>({...f,type:e.target.value}))}>{Object.entries(t.help.types).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></Fld>

            ))}

                  <div key={s.id} className="card">

                        <p className="text-xs text-slate-400 mt-1">{s.date}</p>
                      </div>
                      {canPost&&<button onClick={()=>setTopSt(p=>p.filter(x=>x.id!==s.id))} className="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-500 text-sm transition-colors flex-shrink-0">✕</button>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {topTab==="parents"&&(
            <div>
              {canPost&&<div className="flex justify-end mb-3"><Btn onClick={()=>setModal("topPar")}>{t.top.addPar}</Btn></div>}

                  {leaders.length>0&&<div className="space-y-3 mb-3">{leaders.map((p,i)=>(
                    <div key={p.id} className="card">
                      <div className="h-1.5 bg-gradient-to-r from-violet-400 to-indigo-400"/>
                      <div className="card-inner flex items-center gap-3">
                        <div className="w-10 h-10 rounded-full bg-gradient-to-br from-violet-200 to-indigo-300 flex items-center justify-center text-xl flex-shrink-0">{i<3?medals[i]:<span className="font-black text-violet-800 text-sm">{i+1}</span>}</div>
                        <div className="flex-1">
                          <h3 className="font-black text-slate-900">{ua?p.name:p.nameRu}</h3>
                          <p className="text-xs font-bold text-violet-600 mt-0.5">{ua?"Активний помічник":"Активный помощник"}</p>
                        </div>
                        <span className="text-sm font-black text-violet-700 bg-violet-100 px-3 py-1.5 rounded-full flex-shrink-0">🤝 {helpCounts[p.id]}</span>
                      </div>
                    </div>
                  ))}</div>}
                  {topPar.length>0&&<div className="space-y-3">{topPar.map((p,i)=>(
                    <div key={p.id} className="card">
                      <div className="h-1.5 bg-gradient-to-r from-violet-400 to-indigo-400"/>
                      <div className="card-inner flex items-start gap-3">
                        <div className="w-10 h-10 rounded-full bg-gradient-to-br from-violet-200 to-indigo-300 flex items-center justify-center text-lg flex-shrink-0 font-black text-violet-800">{i+1}</div>
                        <div className="flex-1">
                          <h3 className="font-black text-slate-900">{ua?p.name:p.nameRu}</h3>
                          <p className="text-xs font-bold text-violet-600 mt-0.5">{t.top.pCats[p.cat]}</p>
                          <p className="text-sm text-slate-600 mt-1">{ua?p.reason:p.reasonRu}</p>
                          <p className="text-xs text-slate-400 mt-1">{p.date}</p>
                        </div>
                        {canPost&&<button onClick={()=>setTopPar(x=>x.filter(q=>q.id!==p.id))} className="w-7 h-7 flex items-center justify-center rounded-lg bg-slate-100 hover:bg-red-100 text-slate-400 hover:text-red-500 text-sm transition-colors flex-shrink-0">✕</button>}
                      </div>
                    </div>
                  ))}</div>}
                  {leaders.length===0&&topPar.length===0&&<Empty text={t.top.noPar}/>}
                </>);
              })()}
            </div>
          )}
          <Modal show={modal==="topSt"} onClose={()=>setModal(null)} title={t.top.addSt}>
            <div className="space-y-3">
              <Fld label={t.top.sName}><input className={INP} value={fTopSt.name} onChange={e=>setFTopSt(f=>({...f,name:e.target.value}))}/></Fld>
              <Fld label={t.top.cat}><select className={INP} value={fTopSt.cat} onChange={e=>setFTopSt(f=>({...f,cat:e.target.value}))}>{Object.entries(t.top.sCats).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></Fld>

              <Fld label={t.top.reason}><input className={INP} value={fTopSt.reason} onChange={e=>setFTopSt(f=>({...f,reason:e.target.value}))}/></Fld>

        <div className="fixed inset-0 bg-black/90 flex flex-col items-center justify-center z-50 p-4" onClick={()=>setPhotoModal(null)}>

          </div>
        </div>
      )}

      {showStats&&(()=>{
        const yr=new Date().getFullYear().toString();
        const byYr=id=>String(new Date(Number(id)||0).getFullYear())===yr;
        const evYear=events.filter(e=>byYr(e.id)).length;
        const pollYear=polls.filter(p=>byYr(p.id)).length;
        const needYear=needs.filter(n=>byYr(n.id)).length;
        const helpYear=helpReqs.filter(h=>byYr(h.id)).length;
        const needDone=needs.filter(n=>n.done).length;
        const rows=[
          {icon:"✅",label:ua?"Вирішено оголошень":"Решено объявлений",val:stats.resolvedCount||0,sub:ua?"заклики до допомоги закриті головою":"призывы к помощи закрытые председателем"},
          {icon:"💰",label:ua?"Зібрано коштів (всього)":"Собрано средств (всего)",val:`${(stats.totalCollected||0).toLocaleString()} грн`,sub:ua?`Витрачено: ${(stats.totalSpent||0).toLocaleString()} грн • Залишок: ${((stats.totalCollected||0)-(stats.totalSpent||0)).toLocaleString()} грн`:`Потрачено: ${(stats.totalSpent||0).toLocaleString()} грн • Остаток: ${((stats.totalCollected||0)-(stats.totalSpent||0)).toLocaleString()} грн`},
          {icon:"📅",label:ua?"Подій завершено":"Событий завершено",val:stats.eventsDone||0,sub:ua?`Всього у ${yr}: ${evYear}`:`Всего в ${yr}: ${evYear}`},
          {icon:"🗳",label:ua?"Опитувань завершено":"Опросов завершено",val:stats.pollsDone||0,sub:ua?`Всього у ${yr}: ${pollYear}`:`Всего в ${yr}: ${pollYear}`},
          {icon:"📋",label:ua?"Потреб виконано":"Нужд выполнено",val:stats.needsDone||0,sub:ua?`Всього у ${yr}: ${needYear}`:`Всего в ${yr}: ${needYear}`},
          {icon:"🤝",label:ua?"Запитів вирішено":"Запросов решено",val:stats.helpDone||0,sub:ua?`Всього у ${yr}: ${helpYear}`:`Всего в ${yr}: ${helpYear}`},
          {icon:"💼",label:ua?"Зборів завершено":"Сборов завершено",val:stats.closedColls||0,sub:ua?`Активних: ${colls.filter(c=>!c.closed).length} • Всього: ${colls.length}`:`Активных: ${colls.filter(c=>!c.closed).length} • Всего: ${colls.length}`},
          {icon:"📸",label:ua?"Фото у альбомі":"Фото в альбоме",val:photos.length,sub:ua?`Додано у ${yr}: ${photos.filter(p=>byYr(p.id)).length}`:`Добавлено в ${yr}: ${photos.filter(p=>byYr(p.id)).length}`},
        ];
        return(
          <div className="fixed inset-0 bg-black/60 z-50 flex items-end justify-center p-4" onClick={()=>setShowStats(false)}>
            <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden" onClick={e=>e.stopPropagation()}>
              <div className="p-4 text-white flex justify-between items-center" style={{background:"linear-gradient(135deg,#6d28d9,#2563eb)"}}>
                <div><h2 className="font-black text-lg">📊 {ua?"Статистика комітету":"Статистика комитета"}</h2><p className="text-violet-200 text-xs">{ua?"Тільки для голови та адміна":"Только для председателя и администратора"}</p></div>
                <button onClick={()=>setShowStats(false)} className="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center text-white font-bold">✕</button>

                  <div key={i} className="flex items-center gap-4 p-3 rounded-2xl bg-slate-50 border border-slate-100">
                    <span className="text-2xl flex-shrink-0">{r.icon}</span>
                    <div className="flex-1 min-w-0">
                      <p className="text-xs font-bold text-slate-500">{r.label}</p>
                      <p className="text-xs text-slate-400 mt-0.5">{r.sub}</p>
                    </div>
                    <span className="font-black text-violet-700 text-lg flex-shrink-0">{r.val}</span>
                  </div>
                ))}
                {user.role==="chairman"&&<button onClick={()=>{if(window.confirm(ua?"Скинути всю статистику до нуля?":"Сбросить всю статистику до нуля?"))window._db&&window._db.ref("klas1b/stats").set({resolvedCount:0,pollsDone:0,eventsDone:0,needsDone:0,helpDone:0,closedColls:0,totalCollected:0,totalSpent:0}).catch(()=>{});}} className="w-full mt-2 py-2.5 rounded-2xl text-xs font-bold text-slate-400 hover:text-red-500 hover:bg-red-50 border border-slate-200 hover:border-red-200 transition-colors">{ua?"🗑 Скинути статистику":"🗑 Сбросить статистику"}</button>}
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── БАНЕР ОНОВЛЕННЯ ─────────────────────────────────────────── */}
      {updateAvail&&(
        <div className="fixed bottom-4 left-0 right-0 flex justify-center z-50 px-4 pointer-events-none">
          <button
            onClick={()=>{setUpdateAvail(false);window.location.reload(true);}}
            className="pointer-events-auto flex items-center gap-3 px-5 py-3 rounded-2xl shadow-2xl text-white font-bold text-sm"
            style={{background:"linear-gradient(135deg,#7c3aed,#2563eb)",animation:"pulse 2s infinite"}}
          >
            <span style={{fontSize:"20px"}}>🔄</span>
            <span>{ua?"Доступне оновлення — натисніть щоб оновити":"Доступно обновление — нажмите для обновления"}</span>
          </button>
        </div>
      )}
    </div>
  );
}

try{
  ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
}catch(e){
  document.getElementById("root").innerHTML='<div style="padding:20px;background:#fee2e2;border:2px solid #ef4444;border-radius:12px;margin:20px;font-family:monospace;font-size:13px;color:#991b1b"><b>React error:</b><br>'+e.message+'</div>';
}
</script>
</body>
</html>
